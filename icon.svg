<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#333"/>
  <!-- Clock face -->
  <circle cx="256" cy="276" r="180" fill="#f9f9f9"/>
  <!-- Bezel -->
  <circle cx="256" cy="276" r="180" fill="none" stroke="#111" stroke-width="18"/>
  <!-- Tick marks -->
  <g stroke="#222" stroke-linecap="round">
    <line x1="256" y1="106" x2="256" y2="130" stroke-width="8"/>
    <line x1="346" y1="130" x2="334" y2="151" stroke-width="8"/>
    <line x1="406" y1="210" x2="386" y2="222" stroke-width="8"/>
    <line x1="436" y1="276" x2="412" y2="276" stroke-width="8"/>
    <line x1="406" y1="342" x2="386" y2="330" stroke-width="8"/>
    <line x1="346" y1="422" x2="334" y2="401" stroke-width="8"/>
    <line x1="256" y1="446" x2="256" y2="422" stroke-width="8"/>
    <line x1="166" y1="422" x2="178" y2="401" stroke-width="8"/>
    <line x1="106" y1="342" x2="126" y2="330" stroke-width="8"/>
    <line x1="76"  y1="276" x2="100" y2="276" stroke-width="8"/>
    <line x1="106" y1="210" x2="126" y2="222" stroke-width="8"/>
    <line x1="166" y1="130" x2="178" y2="151" stroke-width="8"/>
  </g>
  <!-- Minute hand pointing to ~10 -->
  <line x1="256" y1="276" x2="186" y2="156" stroke="#111" stroke-width="14" stroke-linecap="round"/>
  <!-- Second hand pointing to ~2 -->
  <line x1="256" y1="276" x2="330" y2="140" stroke="#cc0000" stroke-width="5" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="256" cy="276" r="12" fill="#111"/>
  <circle cx="256" cy="276" r="5" fill="#cc0000"/>
  <!-- Crown/button top -->
  <rect x="236" y="76" width="40" height="22" rx="6" fill="#555"/>
</svg>
